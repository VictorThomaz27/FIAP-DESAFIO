<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio FSDT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero"></header>

    <main class="page-content">
        <section class="group-form-card">
            <div class="card-heading">
                <h1>POSTECH - FULLSTACK</h1>
                <p>Desafio aula inaugural</p>
            </div>

            <form action="" method="post" class="form-wrapper">
                <fieldset>
                    <legend>Informações do grupo</legend>

                    <label for="nome1">Nome</label>
                    <input type="text" id="nome1" name="nome1">

                    <label for="nome2">Nome</label>
                    <input type="text" id="nome2" name="nome2">

                    <label for="nome3">Nome</label>
                    <input type="text" id="nome3" name="nome3">

                    <label for="nome4">Nome</label>
                    <input type="text" id="nome4" name="nome4">

                    <label for="nome5">Nome</label>
                    <input type="text" id="nome5" name="nome5">

                    <label for="historia">História do grupo</label>
                    <textarea name="historia" id="historia"></textarea>
                </fieldset>

                <div class="actions">
                    <button type="submit">Enviar</button>
                </div>
            </form>
        </section>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
